name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to publish as a Release (e.g. v1.4.2). Leave blank to only build without releasing."
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Find application folder
        shell: pwsh
        run: |
          $packageFile = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter package.json -File -Recurse |
            Where-Object { $_.FullName -notmatch "node_modules" } |
            Select-Object -First 1
          if (-not $packageFile) {
            Write-Host "::error::package.json was not found."
            exit 1
          }
          "APP_DIRECTORY=$($packageFile.Directory.FullName)" >> $env:GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: ${{ env.APP_DIRECTORY }}
        run: npm install

      - name: Build Windows installer
        working-directory: ${{ env.APP_DIRECTORY }}
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Thunder-Struck-Windows-Installer
          path: ${{ env.APP_DIRECTORY }}/release/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_version != ''
        shell: pwsh
        working-directory: ${{ env.APP_DIRECTORY }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $tag = $env:GITHUB_REF_NAME
          } else {
            $tag = '${{ github.event.inputs.release_version }}'.Trim()
          }
          if ($tag -notmatch '^v\d') {
            Write-Host "::error::Release version must look like v1.4.2 (got '$tag')."
            exit 1
          }
          $installer = (Get-ChildItem release/*.exe | Select-Object -First 1).FullName
          gh release create "$tag" "$installer" --title "Thunder Struck $tag" --generate-notes
